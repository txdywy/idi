name: Build idi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Test and package macOS app
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release artifacts
        run: scripts/package-release.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict .build/app/idi.app

      - name: Upload app bundle zip
        uses: actions/upload-artifact@v7
        with:
          name: idi-app-zip
          path: .build/release/idi.zip
          if-no-files-found: error

      - name: Upload disk image
        uses: actions/upload-artifact@v7
        with:
          name: idi-dmg
          path: .build/release/idi.dmg
          if-no-files-found: error
